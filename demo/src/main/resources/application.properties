spring.application.name=Clone_Shopee

# ==================== Server Configuration ====================
server.port=8080
server.servlet.context-path=/api

# ==================== Database Configuration ====================
spring.datasource.url=jdbc:mysql://localhost:3306/clone_shopee?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==================== JPA & Hibernate Configuration ====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ==================== Logging Configuration ====================
logging.level.root=INFO
logging.level.com.example.demo=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ==================== Jackson Configuration ====================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null

# ==================== Security & JWT Configuration ====================
app.jwt.secret=your-secret-key-change-this-in-production-with-a-very-long-and-secure-key
app.jwt.expiration=86400000

# ==================== Session Configuration ====================
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always

# ==================== Swagger/OpenAPI Configuration ====================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ==================== Modulith Configuration ====================
spring.modulith.observability.enabled=true

