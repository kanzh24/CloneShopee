# ==================== Production Profile ====================
# This profile is used for production deployment

# ==================== Server Configuration ====================
server.port=8080

# ==================== Database Configuration ====================
# Production database - should use environment variables
spring.datasource.url=${DB_URL:jdbc:mysql://db-server:3306/clone_shopee?useSSL=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# ==================== JPA & Hibernate Configuration ====================
# Disable SQL output in production for performance
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ==================== Logging Configuration ====================
# Minimal logging in production
logging.level.root=WARN
logging.level.com.example.demo=INFO
logging.level.org.springframework=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

# ==================== JWT Configuration ====================
# Use environment variable for secret in production
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=3600000

# ==================== Swagger/OpenAPI ====================
# Disable Swagger UI in production
springdoc.swagger-ui.enabled=false

# ==================== Performance & Security ====================
server.compression.enabled=true
server.compression.min-response-size=1024

