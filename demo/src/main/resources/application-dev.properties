# ==================== Development Profile ====================
# This profile is used for local development

# ==================== Server Configuration ====================
server.port=8080

# ==================== Database Configuration ====================
# Local MySQL development database
spring.datasource.url=jdbc:mysql://localhost:3306/clone_shopee_dev?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# ==================== JPA & Hibernate Configuration ====================
# Enable detailed SQL output for debugging
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ==================== Logging Configuration ====================
# Very verbose logging for development
logging.level.root=INFO
logging.level.com.example.demo=DEBUG
logging.level.org.springframework=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ==================== JWT Configuration ====================
# Use a simple key for development
app.jwt.secret=dev-secret-key-not-for-production-use-in-development-only
app.jwt.expiration=86400000

# ==================== Swagger/OpenAPI ====================
springdoc.swagger-ui.enabled=true

